<!doctype html>
<html lang="tr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>TonCrime</title>

    <style>
      :root {
        --sat: env(safe-area-inset-top, 0px);
        --sar: env(safe-area-inset-right, 0px);
        --sab: env(safe-area-inset-bottom, 0px);
        --sal: env(safe-area-inset-left, 0px);
      }

      html, body {
        margin: 0;
        padding: 0;
        height: 100%;
        width: 100%;
        background: #0b0b0f;
        overflow: hidden;
        touch-action: none;
        font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
      }

      #game {
        position: fixed;
        left: 0;
        top: 0;
        width: 100vw;
        height: 100vh;
        display: block;
      }

      #safe {
        position: fixed;
        left: var(--sal);
        top: var(--sat);
        right: var(--sar);
        bottom: var(--sab);
        pointer-events: none;
      }

      /* ===== TOP HUD (GLOBAL) ===== */
      #hudTop {
        position: fixed;
        left: var(--sal);
        right: var(--sar);
        top: var(--sat);
        padding: 10px 12px 0;
        z-index: 9998;
        pointer-events: auto;
      }

      #hudTop, #hudTop * {
        touch-action: auto;
        -webkit-user-select: none;
        user-select: none;
      }

      #hudRow {
        display: grid;
        grid-template-columns: 1fr auto 1fr;
        align-items: center;
        gap: 10px;
      }

      .hudPanel {
        background: rgba(0,0,0,0.55);
        border: 1px solid rgba(255,255,255,0.12);
        border-radius: 12px;
        padding: 8px 10px;
        backdrop-filter: blur(6px);
      }

      #hudLeft {
        justify-self: start;
        width: min(270px, 100%);
      }

      #hudLeft .line1 {
        color: rgba(255,255,255,0.92);
        font-size: 13px;
        margin-bottom: 6px;
      }

      #hudLeft .line2 {
        display: flex;
        align-items: center;
        gap: 8px;
        color: rgba(255,255,255,0.92);
        font-size: 13px;
        margin-bottom: 6px;
      }

      #hudCoinIcon {
        width: 16px;
        height: 16px;
        display: inline-block;
      }

      #hudLeft .line3 {
        color: rgba(255,255,255,0.82);
        font-size: 12px;
      }
      #hudLeft .line3 small {
        color: rgba(255,255,255,0.60);
        font-size: 11px;
      }

      #hudLogoWrap {
        justify-self: center;
        pointer-events: none;
      }
      #hudLogo {
        height: 64px;
        width: auto;
        display: block;
        filter: drop-shadow(0 6px 16px rgba(0,0,0,0.35));
      }

      #hudRight {
        justify-self: end;
        width: min(300px, 100%);
        display: grid;
        gap: 8px;
      }

      .bar {
        height: 28px;
        border-radius: 10px;
        background: rgba(255,255,255,0.10);
        border: 1px solid rgba(255,255,255,0.12);
        overflow: hidden;
        position: relative;
      }

      .barFill {
        height: 100%;
        width: 0%;
        background: rgba(255,255,255,0.22);
      }

      .barText {
        position: absolute;
        inset: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        color: rgba(255,255,255,0.92);
        font-size: 12px;
        pointer-events: none;
      }

      /* ===== CHAT DRAWER (GLOBAL) ===== */
      #chatDrawer {
        position: fixed;
        left: var(--sal);
        right: var(--sar);
        bottom: var(--sab);
        height: min(42vh, 360px);
        transform: translateY(calc(100% - 44px));
        transition: transform 220ms ease;
        z-index: 9999;
        pointer-events: auto;
      }

      #chatDrawer, #chatDrawer * {
        touch-action: auto;
        -webkit-user-select: none;
        user-select: none;
      }

      #chatDrawer.open { transform: translateY(0); }

      #chatHeader {
        height: 44px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 0 12px;
        background: rgba(0,0,0,0.72);
        border-top: 1px solid rgba(255,255,255,0.14);
        border-left: 1px solid rgba(255,255,255,0.10);
        border-right: 1px solid rgba(255,255,255,0.10);
        border-top-left-radius: 14px;
        border-top-right-radius: 14px;
        backdrop-filter: blur(6px);
      }

      #chatTitle {
        color: rgba(255,255,255,0.92);
        font-size: 13px;
        display: flex;
        align-items: center;
        gap: 8px;
      }

      #chatToggle {
        appearance: none;
        border: 1px solid rgba(255,255,255,0.18);
        background: rgba(255,255,255,0.10);
        color: rgba(255,255,255,0.92);
        border-radius: 10px;
        height: 28px;
        padding: 0 10px;
        font-size: 12px;
      }

      #chatBody {
        height: calc(100% - 44px);
        background: rgba(0,0,0,0.62);
        border-left: 1px solid rgba(255,255,255,0.10);
        border-right: 1px solid rgba(255,255,255,0.10);
        border-bottom: 1px solid rgba(255,255,255,0.12);
        border-bottom-left-radius: 14px;
        border-bottom-right-radius: 14px;
        overflow: hidden;
        display: flex;
        flex-direction: column;
        backdrop-filter: blur(6px);
      }

      #chatMessages {
        flex: 1;
        overflow-y: auto;
        padding: 10px 10px 6px;
      }

      .msg {
        margin: 6px 0;
        display: flex;
        gap: 8px;
        align-items: baseline;
        color: rgba(255,255,255,0.92);
        font-size: 13px;
        line-height: 1.25;
        word-break: break-word;
      }

      .msg .meta {
        color: rgba(255,255,255,0.55);
        font-size: 11px;
        min-width: 56px;
      }

      #chatInputRow {
        display: flex;
        gap: 8px;
        padding: 8px;
        border-top: 1px solid rgba(255,255,255,0.10);
        background: rgba(0,0,0,0.30);
      }

      #chatInput {
        flex: 1;
        height: 34px;
        border-radius: 10px;
        border: 1px solid rgba(255,255,255,0.18);
        background: rgba(255,255,255,0.06);
        color: rgba(255,255,255,0.92);
        padding: 0 10px;
        outline: none;
        font-size: 13px;
        user-select: text;
        -webkit-user-select: text;
      }

      #chatSend {
        width: 74px;
        height: 34px;
        border-radius: 10px;
        border: 1px solid rgba(255,255,255,0.18);
        background: rgba(255,255,255,0.10);
        color: rgba(255,255,255,0.92);
        font-size: 13px;
      }

      /* ===== PVP OVERLAY ===== */
      #pvpLayer {
        position: fixed;
        left: var(--sal);
        right: var(--sar);
        top: calc(var(--sat) + 92px); /* HUD altına */
        bottom: calc(var(--sab) + 56px); /* chat header payı */
        z-index: 5000; /* hud (9998) altında, canvas üstünde */
        pointer-events: none; /* sadece içindeki tıklanabilirler aktif olacak */
      }

      #pvpWrap {
        position: absolute;
        inset: 0;
        margin: 12px;
        border-radius: 16px;
        border: 1px solid rgba(255,255,255,0.12);
        background: rgba(20,27,46,0.28);
        backdrop-filter: blur(4px);
        display: none; /* default kapalı */
        pointer-events: auto;
      }
      #pvpWrap.open { display: block; }

      #pvpHeader {
        display:flex;
        align-items:center;
        justify-content:space-between;
        padding: 10px 10px 8px;
        border-bottom: 1px solid rgba(255,255,255,0.10);
      }
      #pvpStatus{
        font-weight: 800;
        font-size: 13px;
        color: rgba(255,255,255,0.92);
      }
      .pvpBtns{
        display:flex;
        gap:8px;
      }
      .pvpBtn{
        appearance:none;
        border:1px solid rgba(255,255,255,0.16);
        background: rgba(0,0,0,0.35);
        color: rgba(255,255,255,0.92);
        border-radius: 10px;
        height: 30px;
        padding: 0 10px;
        font-size: 12px;
        font-weight: 700;
      }

      #pvpBars{
        display:grid;
        grid-template-columns: 1fr 1fr;
        gap: 10px;
        padding: 10px;
      }
      .pvpBar{
        height: 14px;
        border-radius: 10px;
        background: rgba(255,255,255,0.08);
        border: 1px solid rgba(255,255,255,0.12);
        overflow:hidden;
        position:relative;
      }
      .pvpFill{
        height:100%;
        width:100%;
        transform-origin: left center;
        transform: scaleX(1);
        background: rgba(255,255,255,0.65);
      }
      .pvpBarLabel{
        display:flex;
        justify-content:space-between;
        font-size: 12px;
        color: rgba(255,255,255,0.78);
        margin-top: 6px;
      }

      #arena{
        position:absolute;
        left:10px;
        right:10px;
        top: 110px;
        bottom: 10px;
        border-radius: 14px;
        border: 1px solid rgba(255,255,255,0.10);
        background: rgba(0,0,0,0.28);
        overflow:hidden;
        touch-action: manipulation;
      }

      /* pvp.js'nin ürettiği ikonlar */
      .action{
        position:absolute;
        width:64px;
        height:64px;
        border-radius:16px;
        border:1px solid rgba(255,255,255,0.12);
        background: rgba(20,27,46,.92);
        display:flex;
        align-items:center;
        justify-content:center;
        user-select:none;
        cursor:pointer;
        box-shadow:0 8px 24px rgba(0,0,0,.28);
      }
      .emoji{ font-size:30px; line-height:1; }

      /* Sağ altta PvP aç/kapa */
      #pvpFab {
        position: fixed;
        right: calc(var(--sar) + 12px);
        bottom: calc(var(--sab) + 56px);
        z-index: 9997; /* hud altında, chat üstünde değil */
        pointer-events: auto;
        appearance:none;
        border:1px solid rgba(255,255,255,0.18);
        background: rgba(0,0,0,0.55);
        color: rgba(255,255,255,0.92);
        border-radius: 14px;
        height: 40px;
        padding: 0 14px;
        font-size: 13px;
        font-weight: 800;
        backdrop-filter: blur(6px);
      }
    </style>
  </head>

  <body>
    <canvas id="game"></canvas>
    <div id="safe"></div>

    <!-- TOP HUD -->
    <div id="hudTop">
      <div id="hudRow">
        <div id="hudLeft" class="hudPanel">
          <div class="line1" id="hudUsername">Player</div>
          <div class="line2">
            <img id="hudCoinIcon" src="./src/assets/yton.png" alt="coin" />
            <div id="hudCoins">Coin: 0</div>
          </div>
          <div class="line3">
            <span id="hudWeaponName">Silah Yok</span>
            <small id="hudWeaponBonus"> +0%</small>
          </div>
        </div>

        <div id="hudLogoWrap">
          <img id="hudLogo" src="./src/assets/logo.png" alt="TonCrime" />
        </div>

        <div id="hudRight" class="hudPanel">
          <div class="bar">
            <div class="barFill" id="hudXpFill"></div>
            <div class="barText" id="hudXpText">LVL 1 • XP 0/100</div>
          </div>
          <div class="bar">
            <div class="barFill" id="hudEnergyFill"></div>
            <div class="barText" id="hudEnergyText">ENERJİ 0/10 • --:--</div>
          </div>
        </div>
      </div>
    </div>

    <!-- PVP LAYER (canvas üstü) -->
    <div id="pvpLayer">
      <div id="pvpWrap">
        <div id="pvpHeader">
          <div id="pvpStatus">PvP • Hazır</div>
          <div class="pvpBtns">
            <button class="pvpBtn" id="pvpStart" type="button">Başlat</button>
            <button class="pvpBtn" id="pvpStop" type="button">Durdur</button>
            <button class="pvpBtn" id="pvpReset" type="button">Sıfırla</button>
          </div>
        </div>

        <div id="pvpBars">
          <div>
            <div class="pvpBar"><div class="pvpFill" id="enemyFill"></div></div>
            <div class="pvpBarLabel"><span>Düşman</span><span id="enemyHpText">100</span></div>
          </div>
          <div>
            <div class="pvpBar"><div class="pvpFill" id="meFill"></div></div>
            <div class="pvpBarLabel"><span>Sen</span><span id="meHpText">100</span></div>
          </div>
        </div>

        <div id="arena"></div>
      </div>
    </div>

    <button id="pvpFab" type="button">PvP</button>

    <!-- CHAT -->
    <div id="chatDrawer">
      <div id="chatHeader">
        <div id="chatTitle">💬 Sohbet</div>
        <button id="chatToggle" type="button">Aç</button>
      </div>
      <div id="chatBody">
        <div id="chatMessages"></div>
        <div id="chatInputRow">
          <input id="chatInput" type="text" placeholder="Mesaj yaz..." />
          <button id="chatSend" type="button">Gönder</button>
        </div>
      </div>
    </div>

    <!-- OYUN -->
    <script type="module" src="./src/main.js"></script>

    <!-- PVP -->
    <script src="./src/pvp.js"></script>
    <script>
      // PvP init (pvp.js -> TonCrimePVP.init/start/stop/reset bekleniyor)
      TonCrimePVP.init({
        arenaId: "arena",
        statusId: "pvpStatus",
        enemyFillId: "enemyFill",
        meFillId: "meFill",
        enemyHpTextId: "enemyHpText",
        meHpTextId: "meHpText"
      });

      const pvpWrap = document.getElementById("pvpWrap");
      const pvpFab = document.getElementById("pvpFab");

      document.getElementById("pvpStart").addEventListener("click", () => TonCrimePVP.start());
      document.getElementById("pvpStop").addEventListener("click", () => TonCrimePVP.stop());
      document.getElementById("pvpReset").addEventListener("click", () => TonCrimePVP.reset());

      pvpFab.addEventListener("click", () => {
        const open = !pvpWrap.classList.contains("open");
        if(open){
          pvpWrap.classList.add("open");
        } else {
          pvpWrap.classList.remove("open");
          TonCrimePVP.stop(); // kapatınca spawn dursun
        }
      });
    </script>
  </body>
</html>
