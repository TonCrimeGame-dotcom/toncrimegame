<!doctype html>
<html lang="tr">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, viewport-fit=cover"
    />
    <title>TonCrime</title>

    <style>
      :root {
        /* Telegram safe-area (iOS) */
        --sat: env(safe-area-inset-top, 0px);
        --sar: env(safe-area-inset-right, 0px);
        --sab: env(safe-area-inset-bottom, 0px);
        --sal: env(safe-area-inset-left, 0px);
      }

      html,
      body {
        margin: 0;
        padding: 0;
        height: 100%;
        width: 100%;
        background: #0b0b0f;
        overflow: hidden;
        touch-action: none; /* telegramda kaydırma olmasın */
      }

      /* Canvas tam ekran */
      #game {
        position: fixed;
        left: 0;
        top: 0;
        width: 100vw;
        height: 100vh;
        display: block;
      }

      /* Safe area overlay (içerik taşmasın diye ölçü alacağız) */
      #safe {
        position: fixed;
        left: var(--sal);
        top: var(--sat);
        right: var(--sar);
        bottom: var(--sab);
        pointer-events: none;
      }
    </style>
  </head>

  <body>
    <canvas id="game"></canvas>
    <div id="safe"></div>
    <script type="module" src="./src/main.js"></script>
  </body>
</html>
