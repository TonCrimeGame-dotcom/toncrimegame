<!doctype html>
<html lang="tr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>TonCrime</title>

    <style>
      :root {
        --sat: env(safe-area-inset-top, 0px);
        --sar: env(safe-area-inset-right, 0px);
        --sab: env(safe-area-inset-bottom, 0px);
        --sal: env(safe-area-inset-left, 0px);
      }

      html, body {
        margin: 0;
        padding: 0;
        height: 100%;
        width: 100%;
        background: #0b0b0f;
        overflow: hidden;
        touch-action: none;
        font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
      }

      #game {
        position: fixed;
        left: 0;
        top: 0;
        width: 100vw;
        height: 100vh;
        display: block;
      }

      #safe {
        position: fixed;
        left: var(--sal);
        top: var(--sat);
        right: var(--sar);
        bottom: var(--sab);
        pointer-events: none;
      }

      /* ===== TOP HUD (GLOBAL) ===== */
      #hudTop {
        position: fixed;
        left: var(--sal);
        right: var(--sar);
        top: var(--sat);
        padding: 10px 12px 0;
        z-index: 9998;
        pointer-events: auto;
      }

      #hudTop, #hudTop * {
        touch-action: auto;
        -webkit-user-select: none;
        user-select: none;
      }

      #hudRow {
        display: grid;
        grid-template-columns: 1fr auto 1fr;
        align-items: center;
        gap: 10px;
      }

      .hudPanel {
        background: rgba(0,0,0,0.55);
        border: 1px solid rgba(255,255,255,0.12);
        border-radius: 12px;
        padding: 8px 10px;
        backdrop-filter: blur(6px);
      }

      #hudLeft {
        justify-self: start;
        width: min(270px, 100%);
      }

      #hudLeft .line1 {
        color: rgba(255,255,255,0.92);
        font-size: 13px;
        margin-bottom: 6px;
      }

      #hudLeft .line2 {
        display: flex;
        align-items: center;
        gap: 8px;
        color: rgba(255,255,255,0.92);
        font-size: 13px;
        margin-bottom: 6px;
      }

      #hudCoinIcon {
        width: 16px;
        height: 16px;
        display: inline-block;
      }

      #hudLeft .line3 {
        color: rgba(255,255,255,0.82);
        font-size: 12px;
      }
      #hudLeft .line3 small {
        color: rgba(255,255,255,0.60);
        font-size: 11px;
      }

      #hudLogoWrap {
        justify-self: center;
        pointer-events: none;
      }
      #hudLogo {
        height: 64px;
        width: auto;
        display: block;
        filter: drop-shadow(0 6px 16px rgba(0,0,0,0.35));
      }

      #hudRight {
        justify-self: end;
        width: min(300px, 100%);
        display: grid;
        gap: 8px;
      }

      .bar {
        height: 28px;
        border-radius: 10px;
        background: rgba(255,255,255,0.10);
        border: 1px solid rgba(255,255,255,0.12);
        overflow: hidden;
        position: relative;
      }

      .barFill {
        height: 100%;
        width: 0%;
        background: rgba(255,255,255,0.22);
      }

      .barText {
        position: absolute;
        inset: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        color: rgba(255,255,255,0.92);
        font-size: 12px;
        pointer-events: none;
      }

      /* ===== CHAT DRAWER (GLOBAL) ===== */
      #chatDrawer {
        position: fixed;
        left: var(--sal);
        right: var(--sar);
        bottom: var(--sab);
        height: min(42vh, 360px);
        transform: translateY(calc(100% - 44px));
        transition: transform 220ms ease;
        z-index: 9999;
        pointer-events: auto;
      }

      #chatDrawer, #chatDrawer * {
        touch-action: auto;
        -webkit-user-select: none;
        user-select: none;
      }

      #chatDrawer.open { transform: translateY(0); }

      #chatHeader {
        height: 44px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 0 12px;
        background: rgba(0,0,0,0.72);
        border-top: 1px solid rgba(255,255,255,0.14);
        border-left: 1px solid rgba(255,255,255,0.10);
        border-right: 1px solid rgba(255,255,255,0.10);
        border-top-left-radius: 14px;
        border-top-right-radius: 14px;
        backdrop-filter: blur(6px);
      }

      #chatTitle {
        color: rgba(255,255,255,0.92);
        font-size: 13px;
        display: flex;
        align-items: center;
        gap: 8px;
      }

      #chatToggle {
        appearance: none;
        border: 1px solid rgba(255,255,255,0.18);
        background: rgba(255,255,255,0.10);
        color: rgba(255,255,255,0.92);
        border-radius: 10px;
        height: 28px;
        padding: 0 10px;
        font-size: 12px;
      }

      #chatBody {
        height: calc(100% - 44px);
        background: rgba(0,0,0,0.62);
        border-left: 1px solid rgba(255,255,255,0.10);
        border-right: 1px solid rgba(255,255,255,0.10);
        border-bottom: 1px solid rgba(255,255,255,0.12);
        border-bottom-left-radius: 14px;
        border-bottom-right-radius: 14px;
        overflow: hidden;
        display: flex;
        flex-direction: column;
        backdrop-filter: blur(6px);
      }

      #chatMessages {
        flex: 1;
        overflow-y: auto;
        padding: 10px 10px 6px;
      }

      .msg {
        margin: 6px 0;
        display: flex;
        gap: 8px;
        align-items: baseline;
        color: rgba(255,255,255,0.92);
        font-size: 13px;
        line-height: 1.25;
        word-break: break-word;
      }

      .msg .meta {
        color: rgba(255,255,255,0.55);
        font-size: 11px;
        min-width: 56px;
      }

      #chatInputRow {
        display: flex;
        gap: 8px;
        padding: 8px;
        border-top: 1px solid rgba(255,255,255,0.10);
        background: rgba(0,0,0,0.30);
      }

      #chatInput {
        flex: 1;
        height: 34px;
        border-radius: 10px;
        border: 1px solid rgba(255,255,255,0.18);
        background: rgba(255,255,255,0.06);
        color: rgba(255,255,255,0.92);
        padding: 0 10px;
        outline: none;
        font-size: 13px;
        user-select: text;
        -webkit-user-select: text;
      }

      #chatSend {
        width: 74px;
        height: 34px;
        border-radius: 10px;
        border: 1px solid rgba(255,255,255,0.18);
        background: rgba(255,255,255,0.10);
        color: rgba(255,255,255,0.92);
        font-size: 13px;
      }

      /* ===== PVP OVERLAY ===== */
      #pvpLayer {
        position: fixed;
        left: var(--sal);
        right: var(--sar);
        top: calc(var(--sat) + 92px);
        bottom: calc(var(--sab) + 56px);
        z-index: 5000; /* canvas üstü, hud altı */
        pointer-events: none;
      }
      #pvpWrap {
        position: absolute;
        inset: 0;
        margin: 12px;
        border-radius: 16px;
        border: 1px solid rgba(255,255,255,0.12);
        background: rgba(20,27,46,0.28);
        backdrop-filter: blur(4px);
        display: none;
        pointer-events: auto;
      }
      #pvpWrap.open { display: block; }

      #pvpHeader{
        display:flex;
        align-items:center;
        justify-content:space-between;
        padding: 10px 10px 8px;
        border-bottom: 1px solid rgba(255,255,255,0.10);
      }
      #pvpStatus{
        font-weight: 800;
        font-size: 13px;
        color: rgba(255,255,255,0.92);
      }
      .pvpBtns{ display:flex; gap:8px; }
      .pvpBtn{
        appearance:none;
        border:1px solid rgba(255,255,255,0.16);
        background: rgba(0,0,0,0.35);
        color: rgba(255,255,255,0.92);
        border-radius: 10px;
        height: 30px;
        padding: 0 10px;
        font-size: 12px;
        font-weight: 700;
        cursor: pointer;
      }

      #pvpBars{
        display:grid;
        grid-template-columns: 1fr 1fr;
        gap: 10px;
        padding: 10px;
      }
      .pvpBar{
        height: 14px;
        border-radius: 10px;
        background: rgba(255,255,255,0.08);
        border: 1px solid rgba(255,255,255,0.12);
        overflow:hidden;
      }
      .pvpFill{
        height:100%;
        width:100%;
        transform-origin: left center;
        transform: scaleX(1);
        background: rgba(255,255,255,0.65);
      }
      .pvpBarLabel{
        display:flex;
        justify-content:space-between;
        font-size: 12px;
        color: rgba(255,255,255,0.78);
        margin-top: 6px;
      }

      #arena{
        position:absolute;
        left:10px;
        right:10px;
        top: 110px;
        bottom: 10px;
        border-radius: 14px;
        border: 1px solid rgba(255,255,255,0.10);
        background: rgba(0,0,0,0.28);
        overflow:hidden;
        touch-action: manipulation;
      }

      /* pvp ikonları */
      .action{
        position:absolute;
        width:64px;
        height:64px;
        border-radius:16px;
        border:1px solid rgba(255,255,255,0.12);
        background: rgba(20,27,46,.92);
        display:flex;
        align-items:center;
        justify-content:center;
        user-select:none;
        cursor:pointer;
        box-shadow:0 8px 24px rgba(0,0,0,.28);
      }
      .emoji{ font-size:30px; line-height:1; }

      /* sağ alt PvP butonu (fallback) */
      #pvpFab {
        position: fixed;
        right: calc(var(--sar) + 12px);
        bottom: calc(var(--sab) + 56px);
        z-index: 9997;
        pointer-events: auto;
        appearance:none;
        border:1px solid rgba(255,255,255,0.18);
        background: rgba(0,0,0,0.55);
        color: rgba(255,255,255,0.92);
        border-radius: 14px;
        height: 40px;
        padding: 0 14px;
        font-size: 13px;
        font-weight: 800;
        backdrop-filter: blur(6px);
        cursor: pointer;
      }
    </style>
  </head>

  <body>
    <canvas id="game"></canvas>
    <div id="safe"></div>

    <!-- TOP HUD -->
    <div id="hudTop">
      <div id="hudRow">
        <div id="hudLeft" class="hudPanel">
          <div class="line1" id="hudUsername">Player</div>
          <div class="line2">
            <img id="hudCoinIcon" src="./src/assets/yton.png" alt="coin" />
            <div id="hudCoins">Coin: 0</div>
          </div>
          <div class="line3">
            <span id="hudWeaponName">Silah Yok</span>
            <small id="hudWeaponBonus"> +0%</small>
          </div>
        </div>

        <div id="hudLogoWrap">
          <img id="hudLogo" src="./src/assets/logo.png" alt="TonCrime" />
        </div>

        <div id="hudRight" class="hudPanel">
          <div class="bar">
            <div class="barFill" id="hudXpFill"></div>
            <div class="barText" id="hudXpText">LVL 1 • XP 0/100</div>
          </div>
          <div class="bar">
            <div class="barFill" id="hudEnergyFill"></div>
            <div class="barText" id="hudEnergyText">ENERJİ 0/10 • --:--</div>
          </div>
        </div>
      </div>
    </div>

    <!-- PVP LAYER (canvas üstü) -->
    <div id="pvpLayer">
      <div id="pvpWrap">
        <div id="pvpHeader">
          <div id="pvpStatus">PvP • Hazır</div>
          <div class="pvpBtns">
            <button class="pvpBtn" id="pvpStart" type="button">Başlat</button>
            <button class="pvpBtn" id="pvpStop" type="button">Durdur</button>
            <button class="pvpBtn" id="pvpReset" type="button">Sıfırla</button>
          </div>
        </div>

        <div id="pvpBars">
          <div>
            <div class="pvpBar"><div class="pvpFill" id="enemyFill"></div></div>
            <div class="pvpBarLabel"><span>Düşman</span><span id="enemyHpText">100</span></div>
          </div>
          <div>
            <div class="pvpBar"><div class="pvpFill" id="meFill"></div></div>
            <div class="pvpBarLabel"><span>Sen</span><span id="meHpText">100</span></div>
          </div>
        </div>

        <div id="arena"></div>
      </div>
    </div>

    <!-- Fallback PvP button -->
    <button id="pvpFab" type="button">PvP</button>

    <!-- CHAT -->
    <div id="chatDrawer">
      <div id="chatHeader">
        <div id="chatTitle">💬 Sohbet</div>
        <button id="chatToggle" type="button">Aç</button>
      </div>
      <div id="chatBody">
        <div id="chatMessages"></div>
        <div id="chatInputRow">
          <input id="chatInput" type="text" placeholder="Mesaj yaz..." />
          <button id="chatSend" type="button">Gönder</button>
        </div>
      </div>
    </div>

    <!-- OYUN -->
    <script type="module" src="./src/main.js"></script>

    <!-- PVP (global window.TonCrimePVP bekleniyor) -->
    <script src="./src/pvp.js" defer></script>
<script>
document.addEventListener("DOMContentLoaded", () => {
  // ---- HUD helpers ----
  function setHud({ yton, xp, energy, energyMax }) {
    const hudCoins = document.getElementById("hudCoins");
    if (hudCoins) hudCoins.textContent = `Coin: ${yton}`;

    const hudXpText = document.getElementById("hudXpText");
    if (hudXpText) hudXpText.textContent = `XP ${xp}`;

    const hudEnergyText = document.getElementById("hudEnergyText");
    if (hudEnergyText) hudEnergyText.textContent = `ENERJİ ${energy}/${energyMax}`;
  }

  // ---- wallet (localStorage) ----
  const DEFAULTS = { yton: 100, xp: 0, energy: 10, energyMax: 10 };

  function getWallet() {
    return {
      yton: Number(localStorage.getItem("yton") ?? DEFAULTS.yton),
      xp: Number(localStorage.getItem("xp") ?? DEFAULTS.xp),
      energy: Number(localStorage.getItem("energy") ?? DEFAULTS.energy),
      energyMax: Number(localStorage.getItem("energyMax") ?? DEFAULTS.energyMax),
    };
  }

  function setWallet(next) {
    localStorage.setItem("yton", String(next.yton));
    localStorage.setItem("xp", String(next.xp));
    localStorage.setItem("energy", String(next.energy));
    localStorage.setItem("energyMax", String(next.energyMax));
    setHud(next);
  }

  // ilk bas
  setWallet(getWallet());

  // ---- Toast ----
  function showPvpResult(message) {
    let el = document.getElementById("pvpResultToast");
    if (!el) {
      el = document.createElement("div");
      el.id = "pvpResultToast";
      el.style.position = "fixed";
      el.style.left = "50%";
      el.style.top = "18%";
      el.style.transform = "translateX(-50%)";
      el.style.zIndex = "10000";
      el.style.padding = "12px 14px";
      el.style.borderRadius = "14px";
      el.style.border = "1px solid rgba(255,255,255,0.18)";
      el.style.background = "rgba(0,0,0,0.65)";
      el.style.color = "rgba(255,255,255,0.92)";
      el.style.fontWeight = "900";
      el.style.fontSize = "14px";
      el.style.backdropFilter = "blur(6px)";
      el.style.pointerEvents = "none";
      document.body.appendChild(el);
    }
    el.textContent = message;
    el.style.opacity = "1";
    clearTimeout(el._t);
    el._t = setTimeout(() => { el.style.opacity = "0"; }, 1400);
  }

  // ---- History ----
  function loadPvpHistory() {
    try { return JSON.parse(localStorage.getItem("pvpHistory") || "[]"); }
    catch { return []; }
  }
  function savePvpHistory(list) {
    localStorage.setItem("pvpHistory", JSON.stringify(list.slice(-200)));
  }
  function recordPvpResult(payload) {
    const h = loadPvpHistory();
    h.push(payload);
    savePvpHistory(h);
  }

  // ---- Economy rules ----
  function canEnterMatch() {
    const w = getWallet();
    return w.yton >= 6 && w.energy >= 10;
  }

  function applyEnterCost() {
    const w = getWallet();
    setWallet({
      ...w,
      yton: w.yton - 6,
      energy: w.energy - 10
    });
  }

  function applyWin() {
    const w = getWallet();
    setWallet({
      ...w,
      yton: w.yton + 10,
      xp: w.xp + 10
    });
  }

  function applyLose() {
    const w = getWallet();
    setWallet({
      ...w,
      yton: w.yton - 6,
      xp: Math.max(0, w.xp - 5)
    });
  }

  // ---- Matchmaking (şimdilik bot fallback) ----
  async function findOpponent() {
    const status = document.getElementById("pvpStatus");
    if (status) status.textContent = "PvP • Rakip aranıyor...";

    const names = ["Mert","Kerem","Deniz","Arda","Sena","Ece","Yusuf","Atlas","Shadow","Noir","Raven","Kobra"];
    const tags = ["","TR","34","06","x","pro","01"];
    const pick = () => names[Math.floor(Math.random()*names.length)] +
      (Math.random()<0.6 ? "" : "_" + tags[Math.floor(Math.random()*tags.length)]);

    const delay = 2000 + Math.floor(Math.random()*3500);
    await new Promise(r => setTimeout(r, delay));

    // şimdilik her zaman "isBot true"
    return { username: pick(), isBot: true };
  }

  // ---- PvP UI ----
  const wrap = document.getElementById("pvpWrap");
  const fab  = document.getElementById("pvpFab");

  function openOverlay() { wrap.classList.add("open"); }
  function closeOverlay() {
    wrap.classList.remove("open");
    window.TonCrimePVP?.stop?.();
  }

  fab.onclick = () => {
    const open = !wrap.classList.contains("open");
    if (open) openOverlay();
    else closeOverlay();
  };

  document.getElementById("pvpStart").onclick = () => window.TonCrimePVP?.start?.();
  document.getElementById("pvpStop").onclick  = () => window.TonCrimePVP?.stop?.();
  document.getElementById("pvpReset").onclick = () => window.TonCrimePVP?.reset?.();

  // ---- Open PvP from canvas menu ----
  let entering = false;

  window.addEventListener("tc:openPvp", async () => {
    if (!window.TonCrimePVP) {
      console.error("TonCrimePVP yok. pvp.js export kontrol et.");
      return;
    }
    if (entering) return;
    entering = true;

    openOverlay();

    // yeterli mi?
    if (!canEnterMatch()) {
      const status = document.getElementById("pvpStatus");
      if (status) status.textContent = "PvP • Yetersiz YTON / ENERJİ";
      showPvpResult("Yetersiz enerji/yton");
      entering = false;
      return;
    }

    // Rakip ara (önce ara, sonra kes; kullanıcı hissi için)
    const opp = await findOpponent();
    window.TonCrimePVP.setOpponent?.(opp);

    const status = document.getElementById("pvpStatus");
    if (status) status.textContent = `PvP • Rakip bulundu: ${opp.username}`;

    // giriş bedeli
    applyEnterCost();

    // maçı başlat
    window.TonCrimePVP.reset?.();
    window.TonCrimePVP.start?.();

    entering = false;
  });

  // ---- Results from pvp.js ----
  window.addEventListener("tc:pvp:win", (e) => {
    showPvpResult("İyi becerdin");
    applyWin();

    const detail = e.detail || {};
    recordPvpResult({
      matchId: detail.matchId || ("m_" + Date.now()),
      opponent: detail.opponent || { username: "Rakip", isBot: true },
      result: "win",
      ts: Date.now(),
      dmgDone: detail.dmgDone ?? null,
      dmgTaken: detail.dmgTaken ?? null
    });

    // HUD üstüne main.js yazsa bile geri basalım
    setHud(getWallet());
  });

  window.addEventListener("tc:pvp:lose", (e) => {
    showPvpResult("Beceriksiz");
    applyLose();

    const detail = e.detail || {};
    recordPvpResult({
      matchId: detail.matchId || ("m_" + Date.now()),
      opponent: detail.opponent || { username: "Rakip", isBot: true },
      result: "lose",
      ts: Date.now(),
      dmgDone: detail.dmgDone ?? null,
      dmgTaken: detail.dmgTaken ?? null
    });

    setHud(getWallet());
  });

  // ---- HUD sürekli güncel kalsın (main.js üstüne yazarsa düzeltir) ----
  setInterval(() => setHud(getWallet()), 1000);
});
   
    </script>
  </body>
</html>
